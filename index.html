<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OB-GYN Clinical Calculators</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,-apple-system,sans-serif;background:#faf8f4;color:#1a1a1a;max-width:600px;margin:0 auto;}
.hub{padding:16px;}
.hub h1{font-size:22px;font-weight:800;margin-bottom:4px;}
.hub p{font-size:13px;color:#666;margin-bottom:16px;}
.calc-card{display:block;padding:14px 16px;background:#fff;border-radius:10px;border-left:4px solid #888;margin-bottom:10px;cursor:pointer;border-top:1px solid #eee;border-right:1px solid #eee;border-bottom:1px solid #eee;transition:background 0.1s;}
.calc-card:hover{background:#f5f5f5;}
.calc-card .icon{font-size:18px;margin-bottom:2px;}
.calc-card .title{font-size:14px;font-weight:700;}
.calc-card .sub{font-size:12px;color:#666;margin-top:2px;}
.page{padding:16px;}
.back-btn{background:none;border:1px solid #ddd;border-radius:8px;padding:6px 14px;font-size:13px;cursor:pointer;margin-bottom:14px;color:#555;}
.page h1{font-size:20px;font-weight:800;margin-bottom:2px;}
.eyebrow{font-size:12px;color:#888;margin-bottom:14px;}
.section{background:#fff;border-radius:10px;border:1px solid #eee;padding:14px;margin-bottom:12px;}
.stitle{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#888;margin-bottom:10px;}
.field{display:block;margin-bottom:12px;}
.field span{font-size:12px;color:#666;display:block;margin-bottom:4px;}
input[type=number],select{width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:15px;background:#faf8f4;color:#1a1a1a;outline:none;}
input:focus,select:focus{border-color:#555;}
.result{padding:14px;border-radius:10px;margin-top:10px;}
.result .score{font-size:26px;font-weight:800;margin-bottom:4px;}
.result .rlabel{font-size:14px;font-weight:700;margin-bottom:4px;}
.result .action{font-size:12.5px;line-height:1.6;}
.warn{background:#fff8e1;border-left:3px solid #f59e0b;padding:10px 12px;border-radius:0 8px 8px 0;font-size:12.5px;line-height:1.6;margin-bottom:10px;}
.pearl{background:#fffbeb;border-left:3px solid #f59e0b;padding:10px 12px;border-radius:0 8px 8px 0;font-size:12.5px;line-height:1.6;}
.chk-row{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid #f0f0f0;cursor:pointer;}
.chk-row input{margin-top:2px;width:17px;height:17px;flex-shrink:0;cursor:pointer;}
.chk-row .lbl{font-size:13px;line-height:1.5;flex:1;}
.chk-row .pts{font-size:13px;font-weight:700;flex-shrink:0;min-width:28px;text-align:right;}
.btn-grid{display:flex;gap:6px;flex-wrap:wrap;}
.pbtn{padding:6px 10px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;border-width:2px;border-style:solid;background:white;}
tfoot td,.disc{font-size:11px;color:#aaa;text-align:center;padding:16px;}
</style>
</head>
<body>
<div id="root"></div>
<script>
var S={page:'hub',moews:{}};

var CALCS=[
  {id:'si',   icon:'⚡',title:'Shock Index',          sub:'HR ÷ SBP · threshold ≥ 0.9',            color:'#c0392b'},
  {id:'msi',  icon:'💓',title:'Modified Shock Index', sub:'HR ÷ MAP · threshold ≥ 1.4',            color:'#c0392b'},
  {id:'moews',icon:'📈',title:'MOEWS',                sub:'Obstetric Early Warning Score',          color:'#d97706'},
  {id:'vte',  icon:'🩸',title:'VTE Risk Score',       sub:'RCOG Green-top 37a',                     color:'#2e7d32'},
  {id:'gcs',  icon:'🧠',title:'Glasgow Coma Scale',   sub:'E + V + M · /15',                       color:'#c0392b'},
  {id:'qsofa',icon:'🌡️',title:'qSOFA',                sub:'Sepsis screening · /3',                  color:'#c0392b'},
  {id:'puqe', icon:'🤢',title:'PUQE Score',           sub:'Hyperemesis severity · /15',             color:'#d97706'},
  {id:'bishop',icon:'🫄',title:'Bishop Score',        sub:'Cervical readiness · /13',               color:'#1565c0'},
  {id:'apgar',icon:'👶',title:'APGAR Score',          sub:'Neonatal assessment · /10',              color:'#1565c0'},
  {id:'epds', icon:'💙',title:'EPDS',                 sub:'Postnatal Depression Scale · /30',       color:'#4a6fa5'},
  {id:'wells',icon:'🫀',title:'Wells Score',          sub:'DVT/PE pre-test probability',            color:'#2e7d32'},
  {id:'alv',  icon:'🔬',title:'Alvarado Score',       sub:'Appendicitis in pregnancy · /10',        color:'#d97706'},
  {id:'sga',  icon:'📏',title:'SGA / FGR Risk',       sub:'RCOG Green-top 31',                      color:'#2e7d32'},
];

function res(score,label,action,bg,color){
  return '<div class="result" style="background:'+bg+'">'+
    '<div class="score" style="color:'+color+'">'+score+'</div>'+
    '<div class="rlabel" style="color:'+color+'">'+label+'</div>'+
    '<div class="action">'+action+'</div></div>';
}
function sel(id,label,opts,fn){
  return '<label class="field"><span>'+label+'</span>'+
    '<select id="'+id+'" onchange="'+fn+'">'+
    '<option value="">— select —</option>'+
    opts.map(function(o){return '<option value="'+o.v+'">'+o.l+'</option>';}).join('')+
    '</select></label>';
}
function chk(id,cls,lbl,pts,color){
  return '<label class="chk-row">'+
    '<input type="checkbox" id="'+id+'" class="'+cls+'" data-pts="'+pts+'" onchange="calc(\''+cls+'\')">'+
    '<span class="lbl">'+lbl+'</span>'+
    '<span class="pts" style="color:'+color+'">'+pts+'</span></label>';
}

var PAGES={
  si:function(){return '<label class="field"><span>Heart Rate (bpm)</span><input type="number" id="si-hr" min="20" max="250" placeholder="e.g. 110" oninput="doSI()"></label>'+
    '<label class="field"><span>Systolic BP (mmHg)</span><input type="number" id="si-sbp" min="40" max="300" placeholder="e.g. 90" oninput="doSI()"></label>'+
    '<div id="si-r"></div>';},
  msi:function(){return '<label class="field"><span>Heart Rate (bpm)</span><input type="number" id="msi-hr" placeholder="110" oninput="doMSI()"></label>'+
    '<label class="field"><span>Systolic BP (mmHg)</span><input type="number" id="msi-sbp" placeholder="100" oninput="doMSI()"></label>'+
    '<label class="field"><span>Diastolic BP (mmHg)</span><input type="number" id="msi-dbp" placeholder="60" oninput="doMSI()"></label>'+
    '<div id="msi-map" style="font-size:12px;color:#666;margin-bottom:4px;"></div><div id="msi-r"></div>';},
  gcs:function(){return sel('gcs-e','Eye Opening (E)',[{v:4,l:'4 — Spontaneous'},{v:3,l:'3 — To speech'},{v:2,l:'2 — To pain'},{v:1,l:'1 — None'}],'doGCS()')+
    sel('gcs-v','Verbal Response (V)',[{v:5,l:'5 — Orientated'},{v:4,l:'4 — Confused'},{v:3,l:'3 — Words only'},{v:2,l:'2 — Sounds only'},{v:1,l:'1 — None'}],'doGCS()')+
    sel('gcs-m','Motor Response (M)',[{v:6,l:'6 — Obeys commands'},{v:5,l:'5 — Localises pain'},{v:4,l:'4 — Withdraws'},{v:3,l:'3 — Abnormal flexion'},{v:2,l:'2 — Extension'},{v:1,l:'1 — None'}],'doGCS()')+
    '<div id="gcs-r"></div>';},
  qsofa:function(){return chk('qs-rr','qs','Respiratory rate ≥ 22 breaths/min','+1','#c0392b')+
    chk('qs-ms','qs','Altered mental status (GCS < 15)','+1','#c0392b')+
    chk('qs-sbp','qs','Systolic BP ≤ 100 mmHg','+1','#c0392b')+
    '<div id="qs-r" style="margin-top:10px;"></div>';},
  puqe:function(){return sel('pq-n','How long nauseated (last 24h)?',[{v:1,l:'1 — Not at all'},{v:2,l:'2 — ≤1 hour'},{v:3,l:'3 — 2–3 hours'},{v:4,l:'4 — 4–6 hours'},{v:5,l:'5 — >6 hours'}],'doPUQE()')+
    sel('pq-v','Times vomited?',[{v:1,l:'1 — 0'},{v:2,l:'2 — 1–2'},{v:3,l:'3 — 3–4'},{v:4,l:'4 — 5–6'},{v:5,l:'5 — ≥7'}],'doPUQE()')+
    sel('pq-r','Episodes of retching?',[{v:1,l:'1 — 0'},{v:2,l:'2 — 1–2'},{v:3,l:'3 — 3–4'},{v:4,l:'4 — 5–6'},{v:5,l:'5 — ≥7'}],'doPUQE()')+
    '<div id="pq-r"></div>';},
  bishop:function(){return sel('bp-d','Dilation (cm)',[{v:0,l:'0 — Closed'},{v:1,l:'1 — 1–2 cm'},{v:2,l:'2 — 3–4 cm'},{v:3,l:'3 — ≥5 cm'}],'doBP()')+
    sel('bp-e','Effacement (%)',[{v:0,l:'0 — 0–30%'},{v:1,l:'1 — 40–50%'},{v:2,l:'2 — 60–70%'},{v:3,l:'3 — ≥80%'}],'doBP()')+
    sel('bp-s','Fetal Station',[{v:0,l:'0 — −3'},{v:1,l:'1 — −2'},{v:2,l:'2 — −1/0'},{v:3,l:'3 — +1/+2'}],'doBP()')+
    sel('bp-c','Consistency',[{v:0,l:'0 — Firm'},{v:1,l:'1 — Medium'},{v:2,l:'2 — Soft'}],'doBP()')+
    sel('bp-p','Position',[{v:0,l:'0 — Posterior'},{v:1,l:'1 — Mid'},{v:2,l:'2 — Anterior'}],'doBP()')+
    '<div id="bp-r"></div>';},
  apgar:function(){return sel('ap-a','Appearance',[{v:0,l:'0 — Blue/pale'},{v:1,l:'1 — Body pink, extremities blue'},{v:2,l:'2 — Completely pink'}],'doAP()')+
    sel('ap-p','Pulse',[{v:0,l:'0 — Absent'},{v:1,l:'1 — <100 bpm'},{v:2,l:'2 — ≥100 bpm'}],'doAP()')+
    sel('ap-g','Grimace',[{v:0,l:'0 — No response'},{v:1,l:'1 — Grimace/weak cry'},{v:2,l:'2 — Cry/cough/sneeze'}],'doAP()')+
    sel('ap-t','Activity/Tone',[{v:0,l:'0 — Limp'},{v:1,l:'1 — Some flexion'},{v:2,l:'2 — Active flexion'}],'doAP()')+
    sel('ap-r','Respiration',[{v:0,l:'0 — Absent'},{v:1,l:'1 — Slow/irregular'},{v:2,l:'2 — Good cry'}],'doAP()')+
    '<div id="ap-r"></div>';},
  moews:function(){
    var params=[
      {id:'mo-rr',label:'Respiratory Rate',cols:[{r:'≤9',s:3,c:'#b71c1c'},{r:'10–11',s:2,c:'#e65100'},{r:'12–14',s:1,c:'#f57f17'},{r:'15–20',s:0,c:'#2e7d32'},{r:'21–25',s:1,c:'#f57f17'},{r:'26–29',s:2,c:'#e65100'},{r:'≥30',s:3,c:'#b71c1c'}]},
      {id:'mo-sp',label:'SpO₂ (%)',cols:[{r:'≤85',s:3,c:'#b71c1c'},{r:'86–90',s:2,c:'#e65100'},{r:'91–93',s:1,c:'#f57f17'},{r:'≥94',s:0,c:'#2e7d32'}]},
      {id:'mo-sb',label:'Systolic BP',cols:[{r:'≤70',s:3,c:'#b71c1c'},{r:'71–80',s:2,c:'#e65100'},{r:'81–89',s:1,c:'#f57f17'},{r:'90–139',s:0,c:'#2e7d32'},{r:'140–149',s:1,c:'#f57f17'},{r:'150–159',s:2,c:'#e65100'},{r:'≥160',s:3,c:'#b71c1c'}]},
      {id:'mo-hr',label:'Heart Rate',cols:[{r:'≤39',s:3,c:'#b71c1c'},{r:'40–50',s:2,c:'#e65100'},{r:'51–60',s:1,c:'#f57f17'},{r:'61–100',s:0,c:'#2e7d32'},{r:'101–110',s:1,c:'#f57f17'},{r:'111–129',s:2,c:'#e65100'},{r:'≥130',s:3,c:'#b71c1c'}]},
      {id:'mo-tm',label:'Temperature (°C)',cols:[{r:'≤35.0',s:3,c:'#b71c1c'},{r:'35.1–36.0',s:2,c:'#e65100'},{r:'36.1–37.9',s:0,c:'#2e7d32'},{r:'38.0–38.9',s:2,c:'#e65100'},{r:'≥39.0',s:3,c:'#b71c1c'}]},
      {id:'mo-av',label:'AVPU',cols:[{r:'U',s:3,c:'#b71c1c'},{r:'P',s:2,c:'#e65100'},{r:'V',s:1,c:'#f57f17'},{r:'A',s:0,c:'#2e7d32'}]},
      {id:'mo-ur',label:'Urine output (mL/hr)',cols:[{r:'<10',s:3,c:'#b71c1c'},{r:'10–19',s:2,c:'#e65100'},{r:'20–29',s:1,c:'#f57f17'},{r:'≥30',s:0,c:'#2e7d32'}]},
    ];
    return params.map(function(p){
      return '<div style="padding:10px 0;border-bottom:1px solid #f0f0f0;">'+
        '<div style="font-size:13px;font-weight:600;margin-bottom:8px;">'+p.label+'</div>'+
        '<div class="btn-grid">'+p.cols.map(function(c){
          return '<button class="pbtn" data-pid="'+p.id+'" data-score="'+c.s+'" data-color="'+c.c+'" '+
            'style="border-color:'+c.c+';color:'+c.c+';" '+
            'onclick="doMOEWS(this,\''+p.id+'\','+c.s+',\''+c.c+'\')">'+
            c.r+'<br><span style="font-size:10px;">'+c.s+'</span></button>';
        }).join('')+'</div></div>';
    }).join('')+'<div id="mo-r" style="margin-top:12px;"></div>';},
  vte:function(){
    var ant=[
      {id:'va1',l:'Previous VTE (not single provoked by surgery)',p:4},
      {id:'va2',l:'Previous VTE — single provoked by surgery',p:3},
      {id:'va3',l:'High-risk thrombophilia (antithrombin def, compound/homozygous)',p:3},
      {id:'va4',l:'Lower-risk thrombophilia (FVL, PT G20210A, protein C/S def)',p:1},
      {id:'va5',l:'Family history VTE 1st-degree (unprovoked/oestrogen)',p:1},
      {id:'va6',l:'IVF / ART pregnancy',p:1},
      {id:'va7',l:'Parity ≥ 3',p:1},
      {id:'va8',l:'Current smoker',p:1},
      {id:'va9',l:'Gross varicose veins (above knee)',p:1},
      {id:'va10',l:'Immobility / long-haul travel >4 hr',p:1},
      {id:'va11',l:'Systemic infection requiring hospital admission',p:1},
      {id:'va12',l:'BMI ≥ 30 kg/m²',p:1},
      {id:'va13',l:'BMI ≥ 40 kg/m² (add to above)',p:1},
      {id:'va14',l:'Multiple pregnancy',p:1},
      {id:'va15',l:'IVF/ART with OHSS (1st trimester)',p:4},
      {id:'va16',l:'Antepartum haemorrhage / placenta praevia',p:1},
      {id:'va17',l:'Pre-eclampsia in current pregnancy',p:1},
      {id:'va18',l:'Severe dehydration / hyperemesis',p:1},
    ];
    var pn=[
      {id:'vp1',l:'Emergency Caesarean section',p:4},
      {id:'vp2',l:'Elective Caesarean section',p:2},
      {id:'vp3',l:'Mid-cavity / rotational instrumental delivery',p:1},
      {id:'vp4',l:'Prolonged labour (>24 hours)',p:1},
      {id:'vp5',l:'PPH >1 L or blood transfusion',p:1},
      {id:'vp6',l:'Preterm birth (<37 weeks)',p:1},
      {id:'vp7',l:'Stillbirth in this pregnancy',p:1},
      {id:'vp8',l:'Systemic infection requiring IV antibiotics',p:1},
      {id:'vp9',l:'Immobility ≥3 days / long-haul travel',p:1},
    ];
    var h='<div style="font-size:11px;font-weight:700;text-transform:uppercase;color:#888;margin-bottom:6px;">Antenatal</div>';
    ant.forEach(function(f){h+=chk(f.id,'vtc',f.l,'+'+f.p,'#c0392b');});
    h+='<div style="font-size:11px;font-weight:700;text-transform:uppercase;color:#888;margin:10px 0 6px;">Postnatal</div>';
    pn.forEach(function(f){h+=chk(f.id,'vtc',f.l,'+'+f.p,'#c0392b');});
    return h+'<div id="vt-r" style="margin-top:10px;"></div>';},
  wells:function(){
    var items=[
      {id:'wl1',l:'Active cancer',s:1},{id:'wl2',l:'Paralysis/paresis/plaster immobilisation',s:1},
      {id:'wl3',l:'Bedridden >3 days or surgery within 12 weeks',s:1},{id:'wl4',l:'Localised tenderness along deep vein',s:1},
      {id:'wl5',l:'Entire leg swollen',s:1},{id:'wl6',l:'Calf swelling >3 cm vs other leg',s:1},
      {id:'wl7',l:'Pitting oedema in symptomatic leg only',s:1},{id:'wl8',l:'Collateral superficial veins (non-varicose)',s:1},
      {id:'wl9',l:'Previously documented DVT',s:1},{id:'wl10',l:'Alternative diagnosis at least as likely as DVT',s:-2},
    ];
    return items.map(function(f){return chk(f.id,'wlc',f.l,(f.s>0?'+':'')+f.s,f.s<0?'#2e7d32':'#c0392b');}).join('')+
      '<div id="wl-r" style="margin-top:10px;"></div>';},
  alv:function(){
    var items=[
      {id:'al1',l:'Migration of pain to RIF',p:1},{id:'al2',l:'Anorexia / loss of appetite',p:1},
      {id:'al3',l:'Nausea or vomiting',p:1},{id:'al4',l:'RIF tenderness',p:2},
      {id:'al5',l:'Rebound tenderness in RIF',p:1},{id:'al6',l:'Temperature >37.3°C',p:1},
      {id:'al7',l:'Leukocytosis (WBC >10×10⁹/L)',p:2},{id:'al8',l:'Left shift (neutrophilia >75%)',p:1},
    ];
    return '<div class="warn">⚠ Appendix migrates superiorly after 20 weeks. MRI preferred over CT in pregnancy.</div>'+
      items.map(function(f){return chk(f.id,'alc',f.l,'+'+f.p,'#c0392b');}).join('')+
      '<div id="al-r" style="margin-top:10px;"></div>';},
  sga:function(){
    var maj=[
      {id:'sm1',l:'Previous SGA (<10th centile)'},{id:'sm2',l:'Previous unexplained stillbirth/abruption'},
      {id:'sm3',l:'Placenta praevia in current pregnancy'},{id:'sm4',l:'Cocaine/illicit drug use'},
      {id:'sm5',l:'Heavy smoker (≥11 cigarettes/day)'},{id:'sm6',l:'Chronic hypertension on antihypertensives'},
      {id:'sm7',l:'Diabetes with vascular disease'},{id:'sm8',l:'Renal impairment (eGFR <60 or proteinuria)'},
      {id:'sm9',l:'Antiphospholipid syndrome'},{id:'sm10',l:'IVF with donor egg'},
    ];
    var min=[
      {id:'sn1',l:'Age ≥35 years'},{id:'sn2',l:'Nulliparity'},{id:'sn3',l:'BMI <20 kg/m²'},
      {id:'sn4',l:'BMI ≥35 kg/m²'},{id:'sn5',l:'Previous pre-eclampsia'},{id:'sn6',l:'Inter-pregnancy interval >10 years'},
      {id:'sn7',l:'Light smoker (1–10/day)'},{id:'sn8',l:'Low PAPP-A (<0.4 MoM)'},{id:'sn9',l:'Raised uterine artery Dopplers 20–24 weeks'},
    ];
    var h='<div style="font-size:11px;font-weight:700;text-transform:uppercase;color:#c0392b;margin-bottom:6px;">Major risk factors</div>';
    maj.forEach(function(f){h+=chk(f.id,'sgm',f.l,'MAJOR','#c0392b');});
    h+='<div style="font-size:11px;font-weight:700;text-transform:uppercase;color:#d97706;margin:10px 0 6px;">Minor risk factors</div>';
    min.forEach(function(f){h+=chk(f.id,'sgn',f.l,'minor','#d97706');});
    return h+'<div id="sg-r" style="margin-top:10px;"></div>';},
  epds:function(){
    var qs=[
      {id:'eq1',q:'I have been able to laugh and see the funny side of things',opts:[{v:0,l:'As much as I always could'},{v:1,l:'Not quite so much now'},{v:2,l:'Definitely not so much now'},{v:3,l:'Not at all'}]},
      {id:'eq2',q:'I have looked forward with enjoyment to things',opts:[{v:0,l:'As much as ever'},{v:1,l:'Rather less than I used to'},{v:2,l:'Definitely less than I used to'},{v:3,l:'Hardly at all'}]},
      {id:'eq3',q:'I have blamed myself unnecessarily when things went wrong',opts:[{v:3,l:'Yes, most of the time'},{v:2,l:'Yes, some of the time'},{v:1,l:'Not very often'},{v:0,l:'No, never'}]},
      {id:'eq4',q:'I have been anxious or worried for no good reason',opts:[{v:0,l:'No, not at all'},{v:1,l:'Hardly ever'},{v:2,l:'Yes, sometimes'},{v:3,l:'Yes, very often'}]},
      {id:'eq5',q:'I have felt scared or panicky for no very good reason',opts:[{v:3,l:'Yes, quite a lot'},{v:2,l:'Yes, sometimes'},{v:1,l:'No, not much'},{v:0,l:'No, not at all'}]},
      {id:'eq6',q:'Things have been getting on top of me',opts:[{v:3,l:"Yes, most of the time I haven't been coping"},{v:2,l:'Yes, sometimes'},{v:1,l:'No, most of the time I have coped'},{v:0,l:'No, I have been coping as well as ever'}]},
      {id:'eq7',q:'I have been so unhappy I have had difficulty sleeping',opts:[{v:3,l:'Yes, most of the time'},{v:2,l:'Yes, sometimes'},{v:1,l:'Not very often'},{v:0,l:'No, not at all'}]},
      {id:'eq8',q:'I have felt sad or miserable',opts:[{v:3,l:'Yes, most of the time'},{v:2,l:'Yes, quite often'},{v:1,l:'Not very often'},{v:0,l:'No, not at all'}]},
      {id:'eq9',q:'I have been so unhappy I have been crying',opts:[{v:3,l:'Yes, most of the time'},{v:2,l:'Yes, quite often'},{v:1,l:'Only occasionally'},{v:0,l:'No, never'}]},
      {id:'eq10',q:'⚠ The thought of harming myself has occurred to me',opts:[{v:3,l:'Yes, quite often'},{v:2,l:'Sometimes'},{v:1,l:'Hardly ever'},{v:0,l:'Never'}]},
    ];
    return '<div class="warn">⚠ Q10 self-harm: any positive response = immediate safe assessment regardless of total score.</div>'+
      qs.map(function(q,i){
        return '<div style="padding:8px 0;border-bottom:1px solid #f0f0f0;">'+
          '<div style="font-size:13px;font-weight:600;margin-bottom:5px;">'+(i+1)+'. '+q.q+'</div>'+
          '<select id="'+q.id+'" onchange="doEPDS()" style="width:100%;padding:8px;border:1.5px solid #ddd;border-radius:8px;font-size:13px;background:#faf8f4;">'+
          '<option value="">— select —</option>'+
          q.opts.map(function(o){return '<option value="'+o.v+'">'+o.l+'</option>';}).join('')+
          '</select></div>';
      }).join('')+'<div id="ep-r" style="margin-top:10px;"></div>';}
};

// Calculator logic
function doSI(){
  var hr=+document.getElementById('si-hr').value,sbp=+document.getElementById('si-sbp').value;
  var r=document.getElementById('si-r');if(!hr||!sbp){r.innerHTML='';return;}
  var si=(hr/sbp).toFixed(2);
  var t=si<0.9?['#e8f5e9','#2e7d32','Normal','Routine monitoring']:si<1.0?['#fff8e1','#f57f17','Mildly elevated','Increase monitoring']:si<1.4?['#fff3e0','#e65100','Moderate shock','Senior review · IV access · bloods']:['#ffebee','#b71c1c','Severe shock','Immediate MET · Massive haemorrhage protocol'];
  r.innerHTML=res('SI = '+si,t[2],t[3],t[0],t[1]);}

function doMSI(){
  var hr=+document.getElementById('msi-hr').value,sbp=+document.getElementById('msi-sbp').value,dbp=+document.getElementById('msi-dbp').value;
  var r=document.getElementById('msi-r'),m=document.getElementById('msi-map');if(!hr||!sbp||!dbp){r.innerHTML='';return;}
  var map=dbp+(sbp-dbp)/3,msi=(hr/map).toFixed(2);
  if(m)m.textContent='MAP = '+map.toFixed(1)+' mmHg';
  var t=msi<1.4?['#e8f5e9','#2e7d32','Stable','Routine monitoring']:msi<1.7?['#fff8e1','#f57f17','Moderate compromise','Senior review · IV access']:['#ffebee','#b71c1c','Severe','Immediate MET · Major haemorrhage protocol'];
  r.innerHTML=res('MSI = '+msi,t[2],t[3],t[0],t[1]);}

function doGCS(){
  var e=+document.getElementById('gcs-e').value,v=+document.getElementById('gcs-v').value,m=+document.getElementById('gcs-m').value;
  var r=document.getElementById('gcs-r');if(!e||!v||!m){r.innerHTML='';return;}
  var tot=e+v+m;
  var t=tot>=13?['#e8f5e9','#2e7d32','Mild','Monitor closely']:tot>=9?['#fff8e1','#f57f17','Moderate','Senior review · CT · Anaesthetics']:['#ffebee','#b71c1c','Severe — airway at risk','Immediate · ICU · Intubate if ≤8'];
  r.innerHTML=res('GCS = '+tot+'/15 (E'+e+'V'+v+'M'+m+')',t[2],t[3],t[0],t[1]);}

function calc(cls){
  if(cls==='qs'){
    var s=document.querySelectorAll('.qs:checked').length;
    var r=document.getElementById('qs-r');
    var t=s===0?['#e8f5e9','#2e7d32','Low risk','Routine care']:s===1?['#fff8e1','#f57f17','Increased risk','Senior review · Seek infection source']:['#ffebee','#b71c1c','High risk — suspect sepsis','Sepsis Six · Blood cultures · IV antibiotics within 1 hour'];
    r.innerHTML=res('qSOFA = '+s+'/3',t[2],t[3],t[0],t[1]);
  } else if(cls==='vtc'){
    var sc=0;document.querySelectorAll('.vtc:checked').forEach(function(cb){sc+=+cb.dataset.pts;});
    var rv=document.getElementById('vt-r');if(!sc){rv.innerHTML='';return;}
    var tv=sc<3?['#e8f5e9','#2e7d32','Low risk','Mobilisation · hydration · TED stockings']:sc===3?['#fff8e1','#f57f17','Intermediate','Antenatal: LMWH from 28wks · Postnatal: 10 days']:['#ffebee','#b71c1c','High risk','Antenatal: LMWH from 1st trimester · Postnatal: 6 weeks'];
    rv.innerHTML=res('Score = '+sc,tv[2],tv[3],tv[0],tv[1]);
  } else if(cls==='wlc'){
    var sw=0;document.querySelectorAll('.wlc:checked').forEach(function(cb){sw+=+cb.dataset.pts;});
    var rw=document.getElementById('wl-r');
    var tw=sw<=1?['#e8f5e9','#2e7d32','Low probability','D-dimer · USS if positive']:sw<=4?['#fff8e1','#f57f17','Moderate','USS · Interim LMWH']:['#ffebee','#b71c1c','High probability','Imaging now · Therapeutic LMWH immediately'];
    rw.innerHTML=res('Wells = '+sw,tw[2],tw[3],tw[0],tw[1]);
  } else if(cls==='alc'){
    var sa=0;document.querySelectorAll('.alc:checked').forEach(function(cb){sa+=+cb.dataset.pts;});
    var ra=document.getElementById('al-r');if(!sa){ra.innerHTML='';return;}
    var ta=sa<=4?['#e8f5e9','#2e7d32','Low','Discharge with safety-netting']:sa<=6?['#fff8e1','#f57f17','Moderate','Observe · Surgical review · USS/MRI']:sa<=8?['#fff3e0','#e65100','High','Urgent surgical review · MRI · Laparoscopy']:['#ffebee','#b71c1c','Very high','Immediate surgery'];
    ra.innerHTML=res('Alvarado = '+sa+'/10',ta[2],ta[3],ta[0],ta[1]);
  } else if(cls==='sgm'||cls==='sgn'){
    var maj=document.querySelectorAll('.sgm:checked').length,min=document.querySelectorAll('.sgn:checked').length;
    var rg=document.getElementById('sg-r');if(!maj&&!min){rg.innerHTML='';return;}
    var tg=maj>=1?['#ffebee','#b71c1c','HIGH RISK','Serial USS+Dopplers from 26–28wks · Aspirin ≤16wks · Fetal medicine']:min>=3?['#fff3e0','#e65100','HIGH RISK (≥3 minor)','Serial USS from 26–28wks · Aspirin ≤16wks']:min>=1?['#fff8e1','#f57f17','Moderate risk','Growth scan at 36wks minimum']:['#e8f5e9','#2e7d32','Low risk','SFH at every contact'];
    rg.innerHTML=res('Major: '+maj+' · Minor: '+min,tg[2],tg[3],tg[0],tg[1]);
  }
}

function doPUQE(){
  var n=+document.getElementById('pq-n').value,v=+document.getElementById('pq-v').value,r=+document.getElementById('pq-r').value;
  var el=document.getElementById('pq-r');if(!n&&!v&&!r){el.innerHTML='';return;}
  var tot=n+v+r;
  var t=tot<=6?['#e8f5e9','#2e7d32','Mild NVP','Dietary advice · Outpatient']:tot<=12?['#fff8e1','#f57f17','Moderate NVP','Antiemetics · Consider ambulatory care']:['#ffebee','#b71c1c','Severe — Hyperemesis','Admit · IV fluids · Thiamine before glucose · IV antiemetics'];
  el.innerHTML=res('PUQE = '+tot+'/15',t[2],t[3],t[0],t[1]);}

function doBP(){
  var ids=['bp-d','bp-e','bp-s','bp-c','bp-p'],tot=0,ok=true;
  ids.forEach(function(id){var v=document.getElementById(id).value;if(v==='')ok=false;else tot+=+v;});
  var r=document.getElementById('bp-r');if(!ok){r.innerHTML='';return;}
  var t=tot>=8?['#e8f5e9','#2e7d32','Favourable — proceed with ARM ± oxytocin','High chance of successful IOL']:tot>=6?['#fff8e1','#f57f17','Intermediate','Consider membrane sweep · PGE2']:['#ffebee','#b71c1c','Unfavourable — cervical ripening required','PGE2 gel/pessary or Foley balloon before oxytocin'];
  r.innerHTML=res('Bishop = '+tot+'/13',t[2],t[3],t[0],t[1]);}

function doAP(){
  var ids=['ap-a','ap-p','ap-g','ap-t','ap-r'],tot=0,ok=true;
  ids.forEach(function(id){var v=document.getElementById(id).value;if(v==='')ok=false;else tot+=+v;});
  var r=document.getElementById('ap-r');if(!ok){r.innerHTML='';return;}
  var t=tot>=7?['#e8f5e9','#2e7d32','Normal','Routine newborn care']:tot>=4?['#fff8e1','#f57f17','Moderate concern','Stimulate · O₂ · Reassess at 5 min']:['#ffebee','#b71c1c','Severely depressed','Immediate resuscitation · PPV · Neonatal team'];
  r.innerHTML=res('APGAR = '+tot+'/10',t[2],t[3],t[0],t[1]);}

function doMOEWS(btn,pid,score,color){
  S.moews[pid]=score;
  document.querySelectorAll('[data-pid="'+pid+'"]').forEach(function(b){
    var sel=+b.dataset.score===score;
    b.style.background=sel?b.dataset.color:'white';
    b.style.color=sel?'white':b.dataset.color;
  });
  var tot=Object.values(S.moews).reduce(function(a,b){return a+b;},0);
  var red=Object.values(S.moews).some(function(v){return v===3;});
  var r=document.getElementById('mo-r');
  var t=tot<=1&&!red?['#e8f5e9','#2e7d32','Low concern','Routine monitoring']:tot===2&&!red?['#fff8e1','#f57f17','Borderline','Increase frequency · Inform midwife']:tot<=4&&!red?['#fff3e0','#e65100','Moderate','Senior midwife + junior doctor within 30 min']:['#ffebee','#b71c1c','High concern'+(red?' (red parameter)':''),'Immediate senior obstetrician + anaesthetist'];
  r.innerHTML=res('Total = '+tot+(red?' ⚠':''),t[2],t[3],t[0],t[1]);}

function doEPDS(){
  var ids=['eq1','eq2','eq3','eq4','eq5','eq6','eq7','eq8','eq9','eq10'],tot=0,ok=true;
  ids.forEach(function(id){var v=document.getElementById(id).value;if(v==='')ok=false;else tot+=+v;});
  var r=document.getElementById('ep-r');if(!ok){r.innerHTML='';return;}
  var q10=+document.getElementById('eq10').value||0;
  var t=q10>0?['#ffebee','#b71c1c','⚠ Self-harm ideation (Q10)','Immediate safe assessment · Do not leave alone · Urgent perinatal mental health referral']:tot>=13?['#ffebee','#b71c1c','Likely depression','Refer to perinatal mental health · Consider antidepressant']:tot>=10?['#fff8e1','#f57f17','Possible depression','Repeat in 2 weeks · GP/midwife discussion']:['#e8f5e9','#2e7d32','Low risk','Reassure · Routine follow-up'];
  r.innerHTML=res('EPDS = '+tot+'/30',t[2],t[3],t[0],t[1]);}

// Navigation
function nav(id){S.page=id;render();}
function goBack(){S.page='hub';S.moews={};render();}

function render(){
  var root=document.getElementById('root');
  if(S.page==='hub'){
    root.innerHTML='<div class="hub"><h1>OB-GYN Calculators</h1><p>13 validated obstetric scoring tools</p>'+
      CALCS.map(function(c){
        return '<div class="calc-card" style="border-left-color:'+c.color+'" onclick="nav(\''+c.id+'\')">'+
          '<div class="icon">'+c.icon+'</div>'+
          '<div class="title">'+c.title+'</div>'+
          '<div class="sub">'+c.sub+'</div></div>';
      }).join('')+
      '<p class="disc">Educational use only · Always verify with RCOG/NICE guidelines · Not a substitute for clinical judgement</p></div>';
  } else {
    var calc=CALCS.find(function(c){return c.id===S.page;});
    var content=PAGES[S.page]?PAGES[S.page]():'Coming soon';
    root.innerHTML='<div class="page">'+
      '<button class="back-btn" onclick="goBack()">← All calculators</button>'+
      '<h1>'+calc.icon+' '+calc.title+'</h1>'+
      '<div class="eyebrow">'+calc.sub+'</div>'+
      '<div class="section">'+content+'</div>'+
      '<p class="disc">Educational use only · Always apply clinical judgement</p></div>';
  }
}

render();
</script>
